<div id="fx-ai-root">
  <button id="fx-ai-launcher" class="fx-ai-launcher" aria-label="Open AI Decision Assistant">
    <span class="fx-ai-launcher-glow"></span>
    <span class="fx-ai-launcher-inner">
      <span class="fx-ai-orb fx-ai-orb-1"></span>
      <span class="fx-ai-orb fx-ai-orb-2"></span>
      <span class="fx-ai-robot-face">
        <span class="fx-ai-eye"></span>
        <span class="fx-ai-eye"></span>
      </span>
    </span>
  </button>

  <section id="fx-ai-panel" class="fx-ai-panel hidden" aria-hidden="true">
    <div class="fx-ai-panel-bg"></div>
    <div class="fx-ai-panel-border"></div>

    <div class="fx-ai-header">
      <div class="fx-ai-header-left">
        <div class="fx-ai-avatar-premium" aria-hidden="true">
          <div class="fx-ai-avatar-core">
            <div class="fx-ai-avatar-top-dot"></div>
            <div class="fx-ai-avatar-face">
              <span class="fx-ai-avatar-eye"></span>
              <span class="fx-ai-avatar-eye"></span>
            </div>
          </div>
        </div>

        <div class="fx-ai-header-copy">
          <h3>AI Decision Assistant</h3>
          <p>Describe the concern and I’ll find the right guide.</p>
        </div>
      </div>

      <div class="fx-ai-header-actions">
        <button id="fx-ai-minimize" class="fx-ai-icon-btn" type="button" title="Minimize" aria-label="Minimize">
          <i class="fa-solid fa-minus"></i>
        </button>
        <button id="fx-ai-close" class="fx-ai-icon-btn fx-ai-close-btn" type="button" title="Close" aria-label="Close">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>

    <div class="fx-ai-toolbar">
      <button class="fx-ai-chip" data-ai-action="find-guide" type="button">
        <i class="fa-solid fa-compass"></i>
        <span>Find Guide</span>
      </button>

      <button class="fx-ai-chip" data-ai-action="recent-guide" type="button">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <span>Recent Match</span>
      </button>

      <button class="fx-ai-chip" data-ai-action="show-guides" type="button">
        <i class="fa-solid fa-layer-group"></i>
        <span>Browse Guides</span>
      </button>
    </div>

    <div class="fx-ai-messages-wrap">
      <div id="fx-ai-messages" class="fx-ai-messages"></div>
    </div>

    <div id="fx-ai-suggestions" class="fx-ai-suggestions"></div>

    <div class="fx-ai-footer">
      <div class="fx-ai-input-wrap">
        <textarea
          id="fx-ai-input"
          class="fx-ai-input"
          rows="1"
          placeholder="Type the concern here..."
        ></textarea>

        <button id="fx-ai-send" class="fx-ai-send-btn" type="button" aria-label="Send message">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>

      <div class="fx-ai-footer-note">
        Guide recommendations are based on your shared decision guide registry.
      </div>
    </div>
  </section>
</div>
