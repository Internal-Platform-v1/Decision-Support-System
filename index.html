<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decision Guide Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root{
      --fedex-purple:#4D148C;
      --fedex-purple-2:#6D28D9;
      --fedex-orange:#FF6600;
      --bg-1:#1b0f46;
      --bg-2:#120b34;
      --card-bg:rgba(20, 16, 58, 0.72);
      --card-border:rgba(255,255,255,.12);
      --input-bg:rgba(255,255,255,.10);
      --input-border:rgba(255,255,255,.12);
      --text:#ffffff;
      --text-soft:rgba(255,255,255,.76);
      --text-muted:rgba(255,255,255,.58);
      --icon-color:rgba(255,255,255,.88);
      --icon-color-soft:rgba(255,255,255,.78);
      --autofill-bg:#d8deea;
      --autofill-text:#1f2937;
      --autofill-icon:#6b7280;
      --success-bg:rgba(20,83,45,.42);
      --success-border:rgba(187,247,208,.28);
      --error-bg:rgba(127,29,29,.42);
      --error-border:rgba(254,202,202,.28);
      --shadow-xl:0 30px 80px rgba(2,6,23,.42);
      --radius-xl:34px;
      --radius-lg:22px;
      --radius-md:18px;
      font-family:"Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *{box-sizing:border-box}

    html, body{
      min-height:100%;
    }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(130,77,255,.22), transparent 26%),
        radial-gradient(circle at bottom right, rgba(255,102,0,.10), transparent 18%),
        linear-gradient(180deg, #2b0d68 0%, #190d45 45%, #120b34 100%);
      overflow-x:hidden;
    }

    .login-shell{
      width:min(100%, 620px);
      position:relative;
    }

    .login-card{
      position:relative;
      overflow:hidden;
      border-radius:40px;
      padding:28px;
      background:
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.08), transparent 24%),
        radial-gradient(circle at 0% 100%, rgba(255,102,0,.08), transparent 24%),
        linear-gradient(180deg, rgba(52,22,115,.82), rgba(18,18,58,.76));
      border:1px solid var(--card-border);
      box-shadow:var(--shadow-xl);
      backdrop-filter:blur(16px);
    }

    .signin-head{
      margin-bottom:20px;
    }

    .signin-head h1{
      margin:0 0 10px;
      font-size:clamp(2.1rem, 5vw, 3rem);
      line-height:.95;
      letter-spacing:-.06em;
      font-weight:900;
    }

    .signin-head p{
      margin:0;
      color:var(--text-soft);
      font-size:15px;
      line-height:1.65;
    }

    .field{
      display:grid;
      gap:8px;
      margin-bottom:16px;
    }

    .label-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .label{
      font-size:13px;
      font-weight:800;
      color:#fff;
      letter-spacing:-.01em;
    }

    .label-hint{
      font-size:12px;
      color:var(--text-muted);
      font-weight:600;
    }

    .input-wrap{
      position:relative;
    }

    .left-icon{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      color:var(--icon-color);
      font-size:16px;
      pointer-events:none;
      z-index:2;
      text-shadow:0 1px 6px rgba(0,0,0,.18);
      transition:.2s ease;
    }

    .input-wrap input{
      width:100%;
      min-height:60px;
      border:none;
      outline:none;
      border-radius:20px;
      background:var(--input-bg);
      color:#fff;
      padding:0 18px 0 50px;
      font-size:15px;
      font-weight:700;
      box-shadow:inset 0 0 0 1px var(--input-border);
      transition:.22s ease;
    }

    .input-wrap input::placeholder{
      color:rgba(255,255,255,.42);
      font-weight:600;
    }

    .input-wrap input:focus{
      background:rgba(255,255,255,.13);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.18),
        0 0 0 4px rgba(255,255,255,.04);
    }

    #password{
      padding-right:58px;
    }

    .toggle-password{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      width:36px;
      height:36px;
      border:none;
      border-radius:12px;
      background:transparent;
      color:var(--icon-color-soft);
      cursor:pointer;
      display:grid;
      place-items:center;
      transition:.2s ease;
      font-size:15px;
      z-index:3;
    }

    .toggle-password:hover{
      background:rgba(255,255,255,.08);
      color:#fff;
    }

    .toggle-password.active{
      background:rgba(255,255,255,.10);
      color:#fff;
    }

    .input-wrap input:-webkit-autofill,
    .input-wrap input:-webkit-autofill:hover,
    .input-wrap input:-webkit-autofill:focus,
    .input-wrap input:-webkit-autofill:active{
      -webkit-text-fill-color:var(--autofill-text) !important;
      caret-color:var(--autofill-text) !important;
      box-shadow:
        inset 0 0 0 1000px var(--autofill-bg),
        inset 0 0 0 1px rgba(148,163,184,.28) !important;
      transition:background-color 9999s ease-in-out 0s;
    }

    .input-wrap:has(input:-webkit-autofill) .left-icon{
      color:var(--autofill-icon);
      text-shadow:none;
    }

    .input-wrap:has(input:-webkit-autofill) .toggle-password{
      color:var(--autofill-icon);
    }

    .input-wrap:has(input:-webkit-autofill) .toggle-password:hover{
      background:rgba(15,23,42,.06);
      color:#374151;
    }

    .primary-btn{
      width:100%;
      min-height:60px;
      margin-top:4px;
      border:none;
      border-radius:20px;
      background:linear-gradient(135deg, var(--fedex-orange), #ff7a00);
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:-.01em;
      cursor:pointer;
      box-shadow:0 18px 34px rgba(255,102,0,.28);
      transition:.22s ease;
    }

    .primary-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 22px 38px rgba(255,102,0,.34);
    }

    .primary-btn:disabled{
      opacity:.75;
      cursor:not-allowed;
      transform:none;
    }

    .primary-btn.is-loading{
      cursor:wait;
      box-shadow:
        0 18px 34px rgba(255,102,0,.28),
        0 0 0 6px rgba(255,102,0,.10);
      animation:loadingGlow 1.2s ease-in-out infinite alternate;
    }

    .forgot-row{
      margin-top:14px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .forgot-link{
      display:inline-block;
      color:#b89cff;
      font-size:14px;
      font-weight:700;
      text-decoration:underline;
      text-decoration-thickness:2px;
      text-underline-offset:4px;
      background:none;
      border:none;
      padding:0;
      cursor:pointer;
      transition:.2s ease;
    }

    .forgot-link:hover{
      color:#d0bcff;
    }

    .message{
      margin-top:16px;
      padding:14px 16px;
      border-radius:16px;
      font-size:14px;
      line-height:1.65;
      display:none;
    }

    .message.error{
      display:block;
      background:var(--error-bg);
      color:#fff;
      border:1px solid var(--error-border);
    }

    .message.success{
      display:block;
      background:var(--success-bg);
      color:#fff;
      border:1px solid var(--success-border);
    }

    .foot-note{
      margin-top:20px;
      color:var(--text-soft);
      font-size:13px;
      line-height:1.7;
    }

    .btn-spinner{
      width:16px;
      height:16px;
      border:2px solid rgba(255,255,255,.32);
      border-top-color:#fff;
      border-radius:50%;
      display:inline-block;
      animation:btnSpin .7s linear infinite;
      flex-shrink:0;
    }

    .btn-loading-content{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .login-card.state-transition .field,
    .login-card.state-transition .forgot-row,
    .login-card.state-transition .primary-btn,
    .login-card.state-transition .foot-note,
    .login-card.state-transition .message{
      transition:opacity .22s ease, transform .22s ease;
    }

    .fade-in{
      animation:fadeInUp .24s ease;
    }

    .resend-row{
      display:none;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .resend-info{
      font-size:13px;
      color:var(--text-soft);
      line-height:1.5;
    }

    .resend-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:#b89cff;
      font-size:14px;
      font-weight:700;
      text-decoration:underline;
      text-decoration-thickness:2px;
      text-underline-offset:4px;
      background:none;
      border:none;
      padding:0;
      cursor:pointer;
      transition:.2s ease;
    }

    .resend-link:hover{
      color:#d0bcff;
    }

    .resend-link:disabled{
      opacity:.55;
      cursor:not-allowed;
      text-decoration:none;
    }

    @keyframes btnSpin{
      to{ transform:rotate(360deg); }
    }

    @keyframes loadingGlow{
      from{
        box-shadow:
          0 18px 34px rgba(255,102,0,.22),
          0 0 0 0 rgba(255,102,0,.08);
      }
      to{
        box-shadow:
          0 18px 34px rgba(255,102,0,.34),
          0 0 0 8px rgba(255,102,0,.12);
      }
    }

    @keyframes fadeInUp{
      from{
        opacity:0;
        transform:translateY(6px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media (max-width: 640px){
      body{
        padding:10px;
      }

      .login-card{
        padding:18px;
        border-radius:28px;
      }

      .signin-head h1{
        font-size:2.4rem;
      }

      .signin-head p{
        font-size:14px;
      }

      .input-wrap input{
        min-height:56px;
      }

      .primary-btn{
        min-height:56px;
      }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <section class="login-card">
      <div class="signin-head">
        <h1>Sign in</h1>
        <p>Use your approved vndr account to continue.</p>
      </div>

      <div class="field">
        <div class="label-row">
          <label class="label" for="email">Username</label>
          <span class="label-hint">Company email only</span>
        </div>
        <div class="input-wrap">
          <i class="fa-regular fa-envelope left-icon"></i>
          <input
            id="email"
            type="email"
            placeholder=".vndr@fedexfreight.com"
            autocomplete="email"
          >
        </div>
      </div>

      <div class="field">
        <div class="label-row">
          <label class="label" for="password">Password</label>
          <span class="label-hint">Required to continue</span>
        </div>
        <div class="input-wrap">
          <i class="fa-solid fa-lock left-icon"></i>
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          >
          <button
            type="button"
            class="toggle-password"
            id="togglePassword"
            aria-label="Show password"
          >
            <i class="fa-regular fa-eye" id="togglePasswordIcon"></i>
          </button>
        </div>
      </div>

      <button class="primary-btn" id="loginBtn" type="button">
        Sign In
      </button>

      <div class="forgot-row" id="forgotRow">
        <button class="forgot-link" id="resetBtn" type="button">Forgot password?</button>
      </div>

      <div id="message" class="message"></div>

      <div class="foot-note">
        Only verified, approved, and trusted-device users can access the main guide page.
      </div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDjaMdeh0Cgx00hzDyZOi54fDkR81wnxJU",
      authDomain: "bdgg-database.firebaseapp.com",
      projectId: "bdgg-database",
      storageBucket: "bdgg-database.appspot.com",
      messagingSenderId: "43574975434",
      appId: "1:43574975434:web:4c79e581267fdfcc6ccd33"
    };

    const ALLOWED_DOMAIN = "@fedexfreight.com";
    const APPROVED_USERS_COLLECTION = "approved_users";
    const REDIRECT_AFTER_LOGIN = "index-main.html";
    const CHANGE_PASSWORD_PAGE = "change-password.html";

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();

    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const resetBtn = document.getElementById("resetBtn");
    const messageEl = document.getElementById("message");
    const togglePasswordBtn = document.getElementById("togglePassword");
    const togglePasswordIcon = document.getElementById("togglePasswordIcon");

    function showMessage(text, type = "error") {
      messageEl.className = "message " + type;
      messageEl.textContent = text;
    }

    function clearMessage() {
      messageEl.className = "message";
      messageEl.textContent = "";
      messageEl.style.display = "";
    }

    function normalizeEmail(email) {
      return String(email || "").trim().toLowerCase();
    }

    function isAllowedFedExEmail(email) {
      return normalizeEmail(email).endsWith(ALLOWED_DOMAIN);
    }

    function setLoadingState(isLoading, stage = "checking") {
      loginBtn.disabled = isLoading;
      resetBtn.disabled = isLoading;
      emailEl.disabled = isLoading;
      passwordEl.disabled = isLoading;
      loginBtn.classList.toggle("is-loading", isLoading);

      let text = "Sign In";

      if (isLoading) {
        if (stage === "checking") {
          text = "Checking account access...";
        } else if (stage === "device") {
          text = "Checking trusted device...";
        } else if (stage === "redirect") {
          text = "Preparing your workspace...";
        }
      }

      loginBtn.innerHTML = isLoading
        ? `<span class="btn-loading-content"><span class="btn-spinner"></span><span>${text}</span></span>`
        : `Sign In`;
    }

    function createDeviceId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }

      return "device-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    function getDeviceId() {
      let deviceId = localStorage.getItem("decisionGuideDeviceId");

      if (!deviceId) {
        deviceId = createDeviceId();
        localStorage.setItem("decisionGuideDeviceId", deviceId);
      }

      return deviceId;
    }

    function getDeviceLabel() {
      const ua = navigator.userAgent || "Unknown device";

      if (/Edg\//i.test(ua)) return "Microsoft Edge browser";
      if (/Chrome\//i.test(ua)) return "Google Chrome browser";
      if (/Firefox\//i.test(ua)) return "Firefox browser";
      if (/Safari\//i.test(ua)) return "Safari browser";

      return "Browser device";
    }

    async function checkApprovedUser(email) {
      const emailKey = normalizeEmail(email);
      const docRef = db.collection(APPROVED_USERS_COLLECTION).doc(emailKey);
      const docSnap = await docRef.get();

      if (!docSnap.exists) {
        return {
          allowed: false,
          reason: "This email is not yet approved for access. Please contact your administrator.",
          docRef,
          data: null
        };
      }

      const data = docSnap.data() || {};

      if (data.active === false) {
        return {
          allowed: false,
          reason: "Your account has been disabled. Please contact your administrator.",
          docRef,
          data
        };
      }

      return {
        allowed: true,
        docRef,
        data
      };
    }

    async function handleDeviceCheck(user, userData, docRef) {
      const deviceId = getDeviceId();
      const email = normalizeEmail(user.email);
      const devices = Array.isArray(userData.devices) ? userData.devices : [];
      const now = Date.now();
      const deviceLabel = getDeviceLabel();
      const existingIndex = devices.findIndex(device => device && device.id === deviceId);
      const existingDevice = existingIndex >= 0 ? devices[existingIndex] : null;

      if (existingDevice && existingDevice.verified === false) {
        existingDevice.lastAttemptAt = now;
        existingDevice.label = existingDevice.label || deviceLabel;
        existingDevice.userAgent = navigator.userAgent || "";
        devices[existingIndex] = existingDevice;
        await docRef.update({ devices });
        await auth.signOut();

        showMessage(
          "This device is still waiting for admin approval. Please contact your administrator before trying again.",
          "error"
        );
        return false;
      }

      if (existingDevice && existingDevice.verified !== false) {
        existingDevice.verified = true;
        existingDevice.lastLoginAt = now;
        existingDevice.label = existingDevice.label || deviceLabel;
        existingDevice.userAgent = navigator.userAgent || "";
        devices[existingIndex] = existingDevice;
        await docRef.update({ devices });
        return true;
      }

      if (devices.length === 0) {
        devices.push({
          id: deviceId,
          verified: true,
          label: deviceLabel,
          userAgent: navigator.userAgent || "",
          firstTrustedDevice: true,
          addedAt: now,
          lastLoginAt: now
        });

        await docRef.update({ devices });
        return true;
      }

      devices.push({
        id: deviceId,
        verified: false,
        label: deviceLabel,
        userAgent: navigator.userAgent || "",
        pendingApproval: true,
        addedAt: now,
        lastAttemptAt: now
      });

      await docRef.update({ devices });
      await auth.signOut();

      showMessage(
        "New device detected. For security, this device must be approved by an administrator before access is allowed.",
        "error"
      );
      return false;
    }

    async function continueAfterSecurityChecks(user) {
      if (!user) {
        showMessage("Unable to sign in right now.");
        return;
      }

      const email = normalizeEmail(user.email);

      if (!isAllowedFedExEmail(email)) {
        await auth.signOut();
        showMessage("Please use your FedEx Freight email address.");
        return;
      }

      if (!user.emailVerified) {
        await user.sendEmailVerification();
        await auth.signOut();
        showMessage(
          "Your email is not verified yet. A verification email has been sent to your FedEx Freight inbox. Please verify your email first, then sign in again.",
          "success"
        );
        return;
      }

      const approvalCheck = await checkApprovedUser(email);

      if (!approvalCheck.allowed) {
        await auth.signOut();
        showMessage(approvalCheck.reason || "You are not authorized to access this system.");
        return;
      }

      setLoadingState(true, "device");
      const deviceAllowed = await handleDeviceCheck(user, approvalCheck.data, approvalCheck.docRef);
      if (!deviceAllowed) return;

      if (approvalCheck.data.forcePasswordChange === true) {
        window.location.href = CHANGE_PASSWORD_PAGE;
        return;
      }

      setLoadingState(true, "redirect");
      window.location.href = REDIRECT_AFTER_LOGIN;
    }

    togglePasswordBtn.addEventListener("click", () => {
      const isHidden = passwordEl.type === "password";
      passwordEl.type = isHidden ? "text" : "password";
      togglePasswordIcon.className = isHidden ? "fa-regular fa-eye-slash" : "fa-regular fa-eye";
      togglePasswordBtn.classList.toggle("active", isHidden);
      togglePasswordBtn.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
    });

    passwordEl.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        loginBtn.click();
      }
    });

    loginBtn.addEventListener("click", async () => {
      clearMessage();

      const email = normalizeEmail(emailEl.value);
      const password = passwordEl.value;

      if (!email || !password) {
        showMessage("Please enter your email and password.");
        return;
      }

      if (!isAllowedFedExEmail(email)) {
        showMessage("Please use your FedEx Freight email address.");
        return;
      }

      try {
        setLoadingState(true, "checking");

        await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);

        const result = await auth.signInWithEmailAndPassword(email, password);
        await continueAfterSecurityChecks(result.user);
      } catch (error) {
        let friendlyMessage = error.message || "Unable to sign in right now.";

        if (
          error.code === "auth/user-not-found" ||
          error.code === "auth/wrong-password" ||
          error.code === "auth/invalid-login-credentials"
        ) {
          friendlyMessage = "The email or password entered is incorrect.";
        } else if (error.code === "auth/too-many-requests") {
          friendlyMessage = "Too many failed attempts. Please try again later or reset your password.";
        } else if (error.code === "auth/invalid-email") {
          friendlyMessage = "Please enter a valid email address.";
        }

        showMessage(friendlyMessage);
      } finally {
        setLoadingState(false);
      }
    });

    resetBtn.addEventListener("click", async () => {
      clearMessage();

      const email = normalizeEmail(emailEl.value);

      if (!email) {
        showMessage("Enter your email first so a password reset link can be sent to you.");
        return;
      }

      if (!isAllowedFedExEmail(email)) {
        showMessage("Only @fedexfreight.com email addresses are allowed to use this page.");
        return;
      }

      try {
        await auth.sendPasswordResetEmail(email);
        showMessage("A password reset email has been sent successfully.", "success");
      } catch (error) {
        let friendlyMessage = error.message || "Unable to send the password reset email.";

        if (error.code === "auth/user-not-found") {
          friendlyMessage = "No account was found for that email address.";
        } else if (error.code === "auth/invalid-email") {
          friendlyMessage = "Please enter a valid email address.";
        }

        showMessage(friendlyMessage);
      }
    });

    auth.onAuthStateChanged(async (user) => {
      if (!user) return;

      const email = normalizeEmail(user.email);

      if (!isAllowedFedExEmail(email)) {
        await auth.signOut();
        showMessage("Only @fedexfreight.com email addresses are allowed to use this page.");
        return;
      }

      if (!user.emailVerified) return;

      try {
        const approvalCheck = await checkApprovedUser(email);

        if (!approvalCheck.allowed) {
          await auth.signOut();
          showMessage(approvalCheck.reason || "You are not authorized to access this system.");
        }
      } catch (error) {
        console.error("Approval check failed:", error);
      }
    });
  </script>
</body>
</html>
