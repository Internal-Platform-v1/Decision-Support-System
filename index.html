<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decision Guide Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root{
      --fedex-purple:#4D148C;
      --fedex-purple-2:#6D28D9;
      --fedex-orange:#FF6600;
      --bg-1:#1b0f46;
      --bg-2:#120b34;
      --card-bg:rgba(20, 16, 58, 0.72);
      --card-border:rgba(255,255,255,.12);
      --input-bg:rgba(255,255,255,.10);
      --input-border:rgba(255,255,255,.12);
      --text:#ffffff;
      --text-soft:rgba(255,255,255,.76);
      --text-muted:rgba(255,255,255,.58);
      --icon-color:rgba(255,255,255,.88);
      --icon-color-soft:rgba(255,255,255,.78);
      --success-bg:rgba(20,83,45,.42);
      --success-border:rgba(187,247,208,.28);
      --error-bg:rgba(127,29,29,.42);
      --error-border:rgba(254,202,202,.28);
      --shadow-xl:0 30px 80px rgba(2,6,23,.42);
      --radius-xl:34px;
      --radius-lg:22px;
      --radius-md:18px;
      font-family:"Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *{box-sizing:border-box}

    html, body{
      min-height:100%;
    }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(130,77,255,.22), transparent 26%),
        radial-gradient(circle at bottom right, rgba(255,102,0,.10), transparent 18%),
        linear-gradient(180deg, #2b0d68 0%, #190d45 45%, #120b34 100%);
      overflow-x:hidden;
    }

    .login-shell{
      width:min(100%, 620px);
      position:relative;
    }

    .login-card{
      position:relative;
      overflow:hidden;
      border-radius:40px;
      padding:28px;
      background:
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.08), transparent 24%),
        radial-gradient(circle at 0% 100%, rgba(255,102,0,.08), transparent 24%),
        linear-gradient(180deg, rgba(52,22,115,.82), rgba(18,18,58,.76));
      border:1px solid var(--card-border);
      box-shadow:var(--shadow-xl);
      backdrop-filter:blur(16px);
    }

    .signin-head{
      margin-bottom:20px;
    }

    .signin-head h1{
      margin:0 0 10px;
      font-size:clamp(2.1rem, 5vw, 3rem);
      line-height:.95;
      letter-spacing:-.06em;
      font-weight:900;
    }

    .signin-head p{
      margin:0;
      color:var(--text-soft);
      font-size:15px;
      line-height:1.65;
    }

    .field{
      display:grid;
      gap:8px;
      margin-bottom:16px;
    }

    .label-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .label{
      font-size:13px;
      font-weight:800;
      color:#fff;
      letter-spacing:-.01em;
    }

    .label-hint{
      font-size:12px;
      color:var(--text-muted);
      font-weight:600;
    }

    .input-wrap{
      position:relative;
    }

    .left-icon{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      color:var(--icon-color);
      font-size:16px;
      pointer-events:none;
      z-index:2;
      text-shadow:0 1px 6px rgba(0,0,0,.18);
    }

    .input-wrap input{
      width:100%;
      min-height:60px;
      border:none;
      outline:none;
      border-radius:20px;
      background:var(--input-bg);
      color:#fff;
      padding:0 18px 0 50px;
      font-size:15px;
      font-weight:700;
      box-shadow:inset 0 0 0 1px var(--input-border);
      transition:.22s ease;
    }

    .input-wrap input::placeholder{
      color:rgba(255,255,255,.42);
      font-weight:600;
    }

    .input-wrap input:focus{
      background:rgba(255,255,255,.13);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.18),
        0 0 0 4px rgba(255,255,255,.04);
    }

    #password{
      padding-right:58px;
    }

    .toggle-password{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      width:36px;
      height:36px;
      border:none;
      border-radius:12px;
      background:transparent;
      color:var(--icon-color-soft);
      cursor:pointer;
      display:grid;
      place-items:center;
      transition:.2s ease;
      font-size:15px;
    }

    .toggle-password:hover{
      background:rgba(255,255,255,.08);
      color:#fff;
    }

    .toggle-password.active{
      background:rgba(255,255,255,.10);
      color:#fff;
    }

    .primary-btn{
      width:100%;
      min-height:60px;
      margin-top:4px;
      border:none;
      border-radius:20px;
      background:linear-gradient(135deg, var(--fedex-orange), #ff7a00);
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:-.01em;
      cursor:pointer;
      box-shadow:0 18px 34px rgba(255,102,0,.28);
      transition:.22s ease;
    }

    .primary-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 22px 38px rgba(255,102,0,.34);
    }

    .primary-btn:disabled{
      opacity:.75;
      cursor:not-allowed;
      transform:none;
    }

    .forgot-row{
      margin-top:14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .forgot-link{
      display:inline-block;
      color:#b89cff;
      font-size:14px;
      font-weight:700;
      text-decoration:underline;
      text-decoration-thickness:2px;
      text-underline-offset:4px;
      background:none;
      border:none;
      padding:0;
      cursor:pointer;
      transition:.2s ease;
    }

    .forgot-link:hover{
      color:#d0bcff;
    }

    .message{
      margin-top:16px;
      padding:14px 16px;
      border-radius:16px;
      font-size:14px;
      line-height:1.65;
      display:none;
    }

    .message.error{
      display:block;
      background:var(--error-bg);
      color:#fff;
      border:1px solid var(--error-border);
    }

    .message.success{
      display:block;
      background:var(--success-bg);
      color:#fff;
      border:1px solid var(--success-border);
    }

    .foot-note{
      margin-top:20px;
      color:var(--text-soft);
      font-size:13px;
      line-height:1.7;
    }

    .logout-wrap{
      margin-top:14px;
    }

    .logout-btn{
      min-height:46px;
      padding:0 16px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,.10);
      color:#fff;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
    }

    .logout-btn:hover{
      background:rgba(255,255,255,.16);
    }

    @media (max-width: 640px){
      body{
        padding:10px;
      }

      .login-card{
        padding:18px;
        border-radius:28px;
      }

      .signin-head h1{
        font-size:2.4rem;
      }

      .signin-head p{
        font-size:14px;
      }

      .input-wrap input{
        min-height:56px;
      }

      .primary-btn{
        min-height:56px;
      }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <section class="login-card">
      <div class="signin-head">
        <h1>Sign in</h1>
        <p>Use your approved FedEx Freight account to continue.</p>
      </div>

      <div class="field">
        <div class="label-row">
          <label class="label" for="email">FedEx Freight Email</label>
          <span class="label-hint">Company email only</span>
        </div>
        <div class="input-wrap">
          <i class="fa-regular fa-envelope left-icon"></i>
          <input
            id="email"
            type="email"
            placeholder="name@fedexfreight.com"
            autocomplete="email"
          >
        </div>
      </div>

      <div class="field">
        <div class="label-row">
          <label class="label" for="password">Password</label>
          <span class="label-hint">Required to continue</span>
        </div>
        <div class="input-wrap">
          <i class="fa-solid fa-lock left-icon"></i>
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          >
          <button
            type="button"
            class="toggle-password"
            id="togglePassword"
            aria-label="Show password"
          >
            <i class="fa-regular fa-eye" id="togglePasswordIcon"></i>
          </button>
        </div>
      </div>

      <div class="field" id="otpSection" style="display:none;">
        <div class="label-row">
          <label class="label" for="otp">OTP Code</label>
          <span class="label-hint">Enter 6-digit code</span>
        </div>
        <div class="input-wrap">
          <i class="fa-solid fa-shield-halved left-icon"></i>
          <input
            id="otp"
            type="text"
            maxlength="6"
            inputmode="numeric"
            placeholder="Enter OTP"
            autocomplete="one-time-code"
          >
        </div>
      </div>

      <button class="primary-btn" id="loginBtn" type="button">
        Sign in securely
      </button>

      <button class="primary-btn" id="verifyOtpBtn" type="button" style="display:none; margin-top:12px;">
        Verify OTP
      </button>

      <div class="forgot-row">
        <button class="forgot-link" id="resetBtn" type="button">Forgot password?</button>
      </div>

      <div id="message" class="message"></div>

      <div class="logout-wrap">
        <button class="logout-btn" id="logoutBtn" type="button" style="display:none;">Sign out</button>
      </div>

      <div class="foot-note">
        After successful sign-in, only verified and approved users will be redirected to the main guide page.
      </div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
  document.documentElement.classList.add("page-protected");

  const firebaseConfig = {
    apiKey: "AIzaSyDjaMdeh0Cgx00hzDyZOi54fDkR81wnxJU",
    authDomain: "bdgg-database.firebaseapp.com",
    projectId: "bdgg-database",
    storageBucket: "bdgg-database.appspot.com",
    messagingSenderId: "43574975434",
    appId: "1:43574975434:web:4c79e581267fdfcc6ccd33"
  };

  const ALLOWED_DOMAIN = "@fedexfreight.com";
  const APPROVED_USERS_COLLECTION = "approved_users";
  const LOGIN_PAGE = "index.html";

  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }

  const auth = firebase.auth();
  const db = firebase.firestore();

  let selectedRating = 0;
  let commentsUnsubscribe = null;
  let activeCategory = "all";
  let ratingStars = [];

  const container = document.getElementById("guideContainer");
  const cards = Array.from(container.querySelectorAll(".card"));
  const originalOrder = [...cards];

  cards.forEach(card => {
    card.dataset.originalHtml = card.innerHTML;
  });

  function normalizeEmail(email) {
    return String(email || "").trim().toLowerCase();
  }

  function isAllowedFedExEmail(email) {
    return normalizeEmail(email).endsWith(ALLOWED_DOMAIN);
  }

  async function checkApprovedUser(email) {
    const emailKey = normalizeEmail(email);
    const docRef = db.collection(APPROVED_USERS_COLLECTION).doc(emailKey);
    const docSnap = await docRef.get();

    if (!docSnap.exists) {
      return {
        allowed: false,
        reason: "Your account is not authorized to access this system."
      };
    }

    const data = docSnap.data() || {};

    if (data.active === false) {
      return {
        allowed: false,
        reason: "Your account has been disabled. Please contact your administrator."
      };
    }

    return {
      allowed: true,
      data
    };
  }

  async function denyAccessAndRedirect() {
    try {
      await auth.signOut();
    } catch (error) {
      console.error("Sign out failed:", error);
    }
    window.location.replace(LOGIN_PAGE);
  }

  function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function getFreshTokenWithRetry(user, retries = 5, delay = 1200) {
    let tokenResult = null;

    for (let i = 0; i < retries; i++) {
      tokenResult = await user.getIdTokenResult(true);

      if (tokenResult?.claims?.otp_verified === true) {
        return tokenResult;
      }

      if (i < retries - 1) {
        await wait(delay);
      }
    }

    return tokenResult;
  }

  async function guardProtectedPage() {
    return new Promise((resolve) => {
      auth.onAuthStateChanged(async (user) => {
        if (!user) {
          await denyAccessAndRedirect();
          return;
        }

        try {
          if (!isAllowedFedExEmail(user.email)) {
            await denyAccessAndRedirect();
            return;
          }

          if (!user.emailVerified) {
            await denyAccessAndRedirect();
            return;
          }

          const approvalCheck = await checkApprovedUser(user.email);

          if (!approvalCheck.allowed) {
            await denyAccessAndRedirect();
            return;
          }

          const tokenResult = await getFreshTokenWithRetry(user, 5, 1200);

          if (!tokenResult?.claims?.otp_verified) {
            await denyAccessAndRedirect();
            return;
          }

          document.documentElement.classList.remove("page-protected");
          resolve(true);
        } catch (error) {
          console.error("Page guard failed:", error);
          await denyAccessAndRedirect();
        }
      });
    });
  }

  function initRatingStars() {
    ratingStars = Array.from(document.querySelectorAll(".rating-star"));

    ratingStars.forEach(star => {
      star.addEventListener("click", () => {
        selectedRating = Number(star.dataset.value);
        ratingStars.forEach(s => {
          s.classList.toggle("selected", Number(s.dataset.value) <= selectedRating);
        });
      });
    });
  }

  function openAnimatedModal(modal) {
    if (!modal) return;
    modal.style.display = "flex";
    modal.classList.remove("is-closing");

    requestAnimationFrame(() => {
      modal.classList.add("is-open");
    });
  }

  function closeAnimatedModal(modal, onClosed) {
    if (!modal) return;

    modal.classList.remove("is-open");
    modal.classList.add("is-closing");

    setTimeout(() => {
      modal.style.display = "none";
      modal.classList.remove("is-closing");
      if (typeof onClosed === "function") onClosed();
    }, 220);
  }

  function openComment() {
    const modal = document.getElementById("commentModal");
    openAnimatedModal(modal);
  }

  function closeComment() {
    const modal = document.getElementById("commentModal");
    closeAnimatedModal(modal);
  }

  function openHelp() {
    const modal = document.getElementById("helpModal");
    openAnimatedModal(modal);
  }

  function closeHelp() {
    const modal = document.getElementById("helpModal");
    closeAnimatedModal(modal);
  }

  function closeAllComments() {
    const modal = document.getElementById("allCommentsModal");

    closeAnimatedModal(modal, () => {
      if (commentsUnsubscribe) {
        commentsUnsubscribe();
        commentsUnsubscribe = null;
      }
    });
  }

  async function sendComment() {
    const name = document.getElementById("commentName")?.value.trim() || "";
    const comment = document.getElementById("commentText")?.value.trim() || "";
    const message = document.getElementById("feedbackMessage");

    if (!selectedRating) {
      if (message) {
        message.style.display = "block";
        message.style.color = "#ef4444";
        message.textContent = "Please select a star rating first.";
      }
      return;
    }

    try {
      await db.collection("feedback").add({
        rating: selectedRating,
        name,
        comment,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      if (message) {
        message.style.display = "block";
        message.style.color = "#16a34a";
        message.textContent = "Thank you. Your feedback has been submitted.";
      }

      const nameInput = document.getElementById("commentName");
      const commentInput = document.getElementById("commentText");

      if (nameInput) nameInput.value = "";
      if (commentInput) commentInput.value = "";

      selectedRating = 0;
      ratingStars.forEach(s => s.classList.remove("selected"));

      setTimeout(() => {
        if (message) message.style.display = "none";
        closeComment();
      }, 1200);
    } catch (error) {
      console.error(error);
      if (message) {
        message.style.display = "block";
        message.style.color = "#ef4444";
        message.textContent = "Something went wrong while sending feedback.";
      }
    }
  }

  function showAllComments() {
    const commentModal = document.getElementById("commentModal");
    const modal = document.getElementById("allCommentsModal");
    const list = document.getElementById("commentsList");

    if (!modal || !list) return;

    list.innerHTML = "<p>Loading comments.</p>";

    if (commentsUnsubscribe) commentsUnsubscribe();

    const loadComments = () => {
      openAnimatedModal(modal);

      commentsUnsubscribe = db.collection("feedback")
        .orderBy("createdAt", "desc")
        .onSnapshot(snapshot => {
          if (snapshot.empty) {
            list.innerHTML = "<p>No comments yet.</p>";
            return;
          }

          let html = "";
          snapshot.forEach(doc => {
            const item = doc.data();
            const stars = "★".repeat(item.rating || 0) + "☆".repeat(5 - (item.rating || 0));
            html += `
              <div class="comment-list-item">
                <span class="stars">${stars}</span>
                <strong>${item.name || "Anonymous"}</strong>
                <p style="margin:6px 0 0;">${item.comment || "No comment provided."}</p>
              </div>
            `;
          });

          list.innerHTML = html;
        }, error => {
          console.error(error);
          list.innerHTML = "<p>Unable to load comments right now.</p>";
        });
    };

    if (commentModal && commentModal.style.display === "flex") {
      closeAnimatedModal(commentModal, loadComments);
    } else {
      loadComments();
    }
  }

  window.addEventListener("click", (e) => {
    const commentModal = document.getElementById("commentModal");
    const allCommentsModal = document.getElementById("allCommentsModal");
    const helpModal = document.getElementById("helpModal");

    if (e.target === commentModal) closeComment();
    if (e.target === allCommentsModal) closeAllComments();
    if (e.target === helpModal) closeHelp();
  });

  function scrollToGuideResults() {
    const searchBox = document.querySelector(".search-wrap");
    if (!searchBox) return;

    const y = searchBox.getBoundingClientRect().top + window.pageYOffset - 20;
    window.scrollTo({
      top: Math.max(0, y),
      behavior: "smooth"
    });
  }

  function highlightCard(card, keywords) {
    const selectors = ["h1", ".lead", ".small"];
    selectors.forEach(selector => {
      card.querySelectorAll(selector).forEach(el => {
        let html = el.textContent;
        keywords.forEach(keyword => {
          const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const regex = new RegExp(`(${escaped})`, "gi");
          html = html.replace(regex, '<mark class="search-highlight">$1</mark>');
        });
        el.innerHTML = html;
      });
    });
  }

  function filterGuides(shouldScroll = false) {
    const input = document.getElementById("guideSearch");
    const query = input.value.trim().toLowerCase();
    const keywords = query.split(/\s+/).filter(Boolean);
    const clearBtn = document.getElementById("clearSearchBtn");
    const noResults = document.getElementById("noResults");
    const resultsCount = document.getElementById("resultsCount");

    clearBtn.style.display = query ? "block" : "none";

    container.innerHTML = "";

    const matches = [];
    const nonMatches = [];

    originalOrder.forEach(card => {
      card.innerHTML = card.dataset.originalHtml;

      const cardText = card.textContent.toLowerCase();
      const cardCategory = (card.dataset.category || "").toLowerCase();
      const categoryPass = activeCategory === "all" || cardCategory.includes(activeCategory);
      const textPass = !query || keywords.every(keyword => cardText.includes(keyword));

      if (categoryPass && textPass) {
        if (keywords.length) highlightCard(card, keywords);
        matches.push(card);
      } else {
        nonMatches.push(card);
      }
    });

    noResults.style.display = matches.length === 0 ? "block" : "none";

    if (matches.length > 0) {
      resultsCount.style.display = "block";
      const visibleCount = query ? Math.min(matches.length, 4) : matches.length;

      resultsCount.innerHTML = `<span><i class="fa-solid fa-magnifying-glass"></i> Showing ${visibleCount} of ${matches.length} matching guide${matches.length > 1 ? "s" : ""}</span>`;
    } else {
      resultsCount.style.display = "none";
      resultsCount.innerHTML = "";
    }

    matches.forEach((card, index) => {
      card.style.display = (!query || index < 4) ? "flex" : "none";
      container.appendChild(card);
    });

    nonMatches.forEach(card => {
      card.style.display = "none";
      container.appendChild(card);
    });

    if (shouldScroll && query) {
      requestAnimationFrame(() => {
        scrollToGuideResults();
      });
    }
  }

  function clearSearch() {
    const input = document.getElementById("guideSearch");
    input.value = "";
    filterGuides(false);
    input.focus();
  }

  function filterByCategory(category, button) {
    activeCategory = category;

    document.querySelectorAll(".filter-chip").forEach(chip => {
      chip.classList.remove("active");
    });

    if (button) button.classList.add("active");
    filterGuides(true);
  }

  function focusGuideSearch() {
    const input = document.getElementById("guideSearch");
    if (!input) return;

    requestAnimationFrame(() => {
      input.focus({ preventScroll: true });
      input.setSelectionRange(input.value.length, input.value.length);
    });
  }

  window.addEventListener("load", async () => {
    await guardProtectedPage();
    focusGuideSearch();
  });

  document.addEventListener("headerLoaded", () => {
    initRatingStars();
    focusGuideSearch();
  });
</script>
</body>
</html>
