<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decision Guide Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root{
      --fedex-purple:#4D148C;
      --fedex-purple-2:#6D28D9;
      --fedex-orange:#FF6600;
      --bg-1:#1b0f46;
      --bg-2:#120b34;
      --card-bg:rgba(20, 16, 58, 0.72);
      --card-border:rgba(255,255,255,.12);
      --input-bg:rgba(255,255,255,.10);
      --input-border:rgba(255,255,255,.12);
      --text:#ffffff;
      --text-soft:rgba(255,255,255,.76);
      --text-muted:rgba(255,255,255,.58);
      --icon-color:rgba(255,255,255,.88);
      --icon-color-soft:rgba(255,255,255,.78);
      --success-bg:rgba(20,83,45,.42);
      --success-border:rgba(187,247,208,.28);
      --error-bg:rgba(127,29,29,.42);
      --error-border:rgba(254,202,202,.28);
      --shadow-xl:0 30px 80px rgba(2,6,23,.42);
      --radius-xl:34px;
      --radius-lg:22px;
      --radius-md:18px;
      font-family:"Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *{box-sizing:border-box}

    html, body{
      min-height:100%;
    }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(130,77,255,.22), transparent 26%),
        radial-gradient(circle at bottom right, rgba(255,102,0,.10), transparent 18%),
        linear-gradient(180deg, #2b0d68 0%, #190d45 45%, #120b34 100%);
      overflow-x:hidden;
    }

    .login-shell{
      width:min(100%, 620px);
      position:relative;
    }

    .login-card{
      position:relative;
      overflow:hidden;
      border-radius:40px;
      padding:28px;
      background:
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.08), transparent 24%),
        radial-gradient(circle at 0% 100%, rgba(255,102,0,.08), transparent 24%),
        linear-gradient(180deg, rgba(52,22,115,.82), rgba(18,18,58,.76));
      border:1px solid var(--card-border);
      box-shadow:var(--shadow-xl);
      backdrop-filter:blur(16px);
    }

    .signin-head{
      margin-bottom:20px;
    }

    .signin-head h1{
      margin:0 0 10px;
      font-size:clamp(2.1rem, 5vw, 3rem);
      line-height:.95;
      letter-spacing:-.06em;
      font-weight:900;
    }

    .signin-head p{
      margin:0;
      color:var(--text-soft);
      font-size:15px;
      line-height:1.65;
    }

    .field{
      display:grid;
      gap:8px;
      margin-bottom:16px;
    }

    .label-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .label{
      font-size:13px;
      font-weight:800;
      color:#fff;
      letter-spacing:-.01em;
    }

    .label-hint{
      font-size:12px;
      color:var(--text-muted);
      font-weight:600;
    }

    .input-wrap{
      position:relative;
    }

    .left-icon{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      color:var(--icon-color);
      font-size:16px;
      pointer-events:none;
      z-index:2;
      text-shadow:0 1px 6px rgba(0,0,0,.18);
    }

    .input-wrap input{
      width:100%;
      min-height:60px;
      border:none;
      outline:none;
      border-radius:20px;
      background:var(--input-bg);
      color:#fff;
      padding:0 18px 0 50px;
      font-size:15px;
      font-weight:700;
      box-shadow:inset 0 0 0 1px var(--input-border);
      transition:.22s ease;
    }

    .input-wrap input::placeholder{
      color:rgba(255,255,255,.42);
      font-weight:600;
    }

    .input-wrap input:focus{
      background:rgba(255,255,255,.13);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.18),
        0 0 0 4px rgba(255,255,255,.04);
    }

    #password{
      padding-right:58px;
    }

    .toggle-password{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      width:36px;
      height:36px;
      border:none;
      border-radius:12px;
      background:transparent;
      color:var(--icon-color-soft);
      cursor:pointer;
      display:grid;
      place-items:center;
      transition:.2s ease;
      font-size:15px;
    }

    .toggle-password:hover{
      background:rgba(255,255,255,.08);
      color:#fff;
    }

    .toggle-password.active{
      background:rgba(255,255,255,.10);
      color:#fff;
    }

    .primary-btn{
      width:100%;
      min-height:60px;
      margin-top:4px;
      border:none;
      border-radius:20px;
      background:linear-gradient(135deg, var(--fedex-orange), #ff7a00);
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:-.01em;
      cursor:pointer;
      box-shadow:0 18px 34px rgba(255,102,0,.28);
      transition:.22s ease;
    }

    .primary-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 22px 38px rgba(255,102,0,.34);
    }

    .primary-btn:disabled{
      opacity:.75;
      cursor:not-allowed;
      transform:none;
    }

    .forgot-row{
      margin-top:14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .forgot-link{
      display:inline-block;
      color:#b89cff;
      font-size:14px;
      font-weight:700;
      text-decoration:underline;
      text-decoration-thickness:2px;
      text-underline-offset:4px;
      background:none;
      border:none;
      padding:0;
      cursor:pointer;
      transition:.2s ease;
    }

    .forgot-link:hover{
      color:#d0bcff;
    }

    .message{
      margin-top:16px;
      padding:14px 16px;
      border-radius:16px;
      font-size:14px;
      line-height:1.65;
      display:none;
    }

    .message.error{
      display:block;
      background:var(--error-bg);
      color:#fff;
      border:1px solid var(--error-border);
    }

    .message.success{
      display:block;
      background:var(--success-bg);
      color:#fff;
      border:1px solid var(--success-border);
    }

    .foot-note{
      margin-top:20px;
      color:var(--text-soft);
      font-size:13px;
      line-height:1.7;
    }

    .logout-wrap{
      margin-top:14px;
    }

    .logout-btn{
      min-height:46px;
      padding:0 16px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,.10);
      color:#fff;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
    }

    .logout-btn:hover{
      background:rgba(255,255,255,.16);
    }

    @media (max-width: 640px){
      body{
        padding:10px;
      }

      .login-card{
        padding:18px;
        border-radius:28px;
      }

      .signin-head h1{
        font-size:2.4rem;
      }

      .signin-head p{
        font-size:14px;
      }

      .input-wrap input{
        min-height:56px;
      }

      .primary-btn{
        min-height:56px;
      }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <section class="login-card">
      <div class="signin-head">
        <h1>Sign in</h1>
        <p>Use your approved FedEx Freight account to continue.</p>
      </div>

      <div class="field">
        <div class="label-row">
          <label class="label" for="email">FedEx Freight Email</label>
          <span class="label-hint">Company email only</span>
        </div>
        <div class="input-wrap">
          <i class="fa-regular fa-envelope left-icon"></i>
          <input
            id="email"
            type="email"
            placeholder="name@fedexfreight.com"
            autocomplete="email"
          >
        </div>
      </div>

      <div class="field">
        <div class="label-row">
          <label class="label" for="password">Password</label>
          <span class="label-hint">Required to continue</span>
        </div>
        <div class="input-wrap">
          <i class="fa-solid fa-lock left-icon"></i>
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          >
          <button
            type="button"
            class="toggle-password"
            id="togglePassword"
            aria-label="Show password"
          >
            <i class="fa-regular fa-eye" id="togglePasswordIcon"></i>
          </button>
        </div>
      </div>

      <div class="field" id="otpSection" style="display:none;">
        <div class="label-row">
          <label class="label" for="otp">OTP Code</label>
          <span class="label-hint">Enter 6-digit code</span>
        </div>
        <div class="input-wrap">
          <i class="fa-solid fa-shield-halved left-icon"></i>
          <input
            id="otp"
            type="text"
            maxlength="6"
            inputmode="numeric"
            placeholder="Enter OTP"
            autocomplete="one-time-code"
          >
        </div>
      </div>

      <button class="primary-btn" id="loginBtn" type="button">
        Sign in securely
      </button>

      <button class="primary-btn" id="verifyOtpBtn" type="button" style="display:none; margin-top:12px;">
        Verify OTP
      </button>

      <div class="forgot-row">
        <button class="forgot-link" id="resetBtn" type="button">Forgot password?</button>
      </div>

      <div id="message" class="message"></div>

      <div class="logout-wrap">
        <button class="logout-btn" id="logoutBtn" type="button" style="display:none;">Sign out</button>
      </div>

      <div class="foot-note">
        After successful sign-in, only verified and approved users will be redirected to the main guide page.
      </div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDjaMdeh0Cgx00hzDyZOi54fDkR81wnxJU",
      authDomain: "bdgg-database.firebaseapp.com",
      projectId: "bdgg-database",
      storageBucket: "bdgg-database.appspot.com",
      messagingSenderId: "43574975434",
      appId: "1:43574975434:web:4c79e581267fdfcc6ccd33"
    };

    const ALLOWED_DOMAIN = "@fedexfreight.com";
    const APPROVED_USERS_COLLECTION = "approved_users";
    const REDIRECT_AFTER_LOGIN = "index-main.html";
    const OTP_API = "https://otp-server-1-8xfn.onrender.com";

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();

    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const otpEl = document.getElementById("otp");
    const otpSection = document.getElementById("otpSection");
    const loginBtn = document.getElementById("loginBtn");
    const verifyOtpBtn = document.getElementById("verifyOtpBtn");
    const resetBtn = document.getElementById("resetBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const messageEl = document.getElementById("message");
    const togglePasswordBtn = document.getElementById("togglePassword");
    const togglePasswordIcon = document.getElementById("togglePasswordIcon");

    function showMessage(text, type = "error") {
      messageEl.className = "message " + type;
      messageEl.textContent = text;
    }

    function clearMessage() {
      messageEl.className = "message";
      messageEl.textContent = "";
      messageEl.style.display = "";
    }

    function normalizeEmail(email) {
      return String(email || "").trim().toLowerCase();
    }

    function isAllowedFedExEmail(email) {
      return normalizeEmail(email).endsWith(ALLOWED_DOMAIN);
    }

    function setLoadingState(isLoading) {
      loginBtn.disabled = isLoading;
      resetBtn.disabled = isLoading;
      emailEl.disabled = isLoading;
      passwordEl.disabled = isLoading;
      loginBtn.textContent = isLoading ? "Checking access..." : "Sign in securely";
    }

    function setOtpState(isLoading) {
      verifyOtpBtn.disabled = isLoading;
      otpEl.disabled = isLoading;
      verifyOtpBtn.textContent = isLoading ? "Verifying..." : "Verify OTP";
    }

    function showOtpStep() {
      otpSection.style.display = "grid";
      verifyOtpBtn.style.display = "block";
      otpEl.focus();
    }

    function hideOtpStep() {
      otpSection.style.display = "none";
      verifyOtpBtn.style.display = "none";
      otpEl.value = "";
    }

    async function checkApprovedUser(email) {
      const emailKey = normalizeEmail(email);
      const docRef = db.collection(APPROVED_USERS_COLLECTION).doc(emailKey);
      const docSnap = await docRef.get();

      if (!docSnap.exists) {
        return {
          allowed: false,
          reason: "This email is not yet approved for access. Please contact your administrator."
        };
      }

      const data = docSnap.data() || {};

      if (data.active === false) {
        return {
          allowed: false,
          reason: "Your account has been disabled. Please contact your administrator."
        };
      }

      return {
        allowed: true,
        data
      };
    }

    async function getFreshIdToken() {
      const user = auth.currentUser;
      if (!user) {
        throw new Error("No signed-in user was found.");
      }
      return await user.getIdToken(true);
    }

    async function sendOtpRequest() {
      const idToken = await getFreshIdToken();

      let response;
      try {
        response = await fetch(`${OTP_API}/api/send-otp`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${idToken}`
          }
        });
      } catch (error) {
        throw new Error("Unable to connect to the OTP server right now. Please try again in a moment.");
      }

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.message || "Unable to send OTP right now.");
      }

      return data;
    }

    async function verifyOtpRequest(otp) {
      const idToken = await getFreshIdToken();

      let response;
      try {
        response = await fetch(`${OTP_API}/api/verify-otp`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${idToken}`
          },
          body: JSON.stringify({ otp })
        });
      } catch (error) {
        throw new Error("Unable to connect to the OTP server right now. Please try again in a moment.");
      }

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.message || "Unable to verify OTP right now.");
      }

      return data;
    }

    togglePasswordBtn.addEventListener("click", () => {
      const isHidden = passwordEl.type === "password";
      passwordEl.type = isHidden ? "text" : "password";
      togglePasswordIcon.className = isHidden ? "fa-regular fa-eye-slash" : "fa-regular fa-eye";
      togglePasswordBtn.classList.toggle("active", isHidden);
      togglePasswordBtn.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
    });

    passwordEl.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        loginBtn.click();
      }
    });

    otpEl.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        verifyOtpBtn.click();
      }
    });

    loginBtn.addEventListener("click", async () => {
      clearMessage();
      hideOtpStep();

      const email = normalizeEmail(emailEl.value);
      const password = passwordEl.value;

      if (!email || !password) {
        showMessage("Please enter your email and password.");
        return;
      }

      if (!isAllowedFedExEmail(email)) {
        showMessage("Please use your FedEx Freight email address.");
        return;
      }

      try {
        setLoadingState(true);

        await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);

        const result = await auth.signInWithEmailAndPassword(email, password);
        const user = result.user;

        if (!user) {
          showMessage("Unable to sign in right now.");
          return;
        }

        if (!user.emailVerified) {
          await user.sendEmailVerification();
          await auth.signOut();
          showMessage(
            "Your email is not verified yet. A verification email has been sent to your FedEx Freight inbox. Please verify your email first, then sign in again.",
            "success"
          );
          return;
        }

        const approvalCheck = await checkApprovedUser(user.email);

        if (!approvalCheck.allowed) {
          await auth.signOut();
          showMessage(approvalCheck.reason || "You are not authorized to access this system.");
          return;
        }

        await sendOtpRequest();
        showOtpStep();
        showMessage("An OTP has been sent to your approved email. Enter the code below to continue.", "success");
      } catch (error) {
        let friendlyMessage = error.message || "Unable to sign in right now.";

        if (
          error.code === "auth/user-not-found" ||
          error.code === "auth/wrong-password" ||
          error.code === "auth/invalid-login-credentials"
        ) {
          friendlyMessage = "The email or password entered is incorrect.";
        } else if (error.code === "auth/too-many-requests") {
          friendlyMessage = "Too many failed attempts. Please try again later or reset your password.";
        } else if (error.code === "auth/invalid-email") {
          friendlyMessage = "Please enter a valid email address.";
        }

        showMessage(friendlyMessage);
      } finally {
        setLoadingState(false);
      }
    });

    verifyOtpBtn.addEventListener("click", async () => {
      clearMessage();

      const otp = String(otpEl.value || "").trim();

      if (!otp) {
        showMessage("Please enter the OTP sent to your email.");
        return;
      }

      if (!/^\d{6}$/.test(otp)) {
        showMessage("Please enter a valid 6-digit OTP.");
        return;
      }

      try {
        setOtpState(true);

        await verifyOtpRequest(otp);
        await auth.currentUser.getIdToken(true);

        showMessage("OTP verified successfully. Redirecting now...", "success");

        setTimeout(() => {
          window.location.href = REDIRECT_AFTER_LOGIN;
        }, 1500);
      } catch (error) {
        showMessage(error.message || "Unable to verify OTP right now.");
      } finally {
        setOtpState(false);
      }
    });

    resetBtn.addEventListener("click", async () => {
      clearMessage();

      const email = normalizeEmail(emailEl.value);

      if (!email) {
        showMessage("Enter your email first so a password reset link can be sent to you.");
        return;
      }

      if (!isAllowedFedExEmail(email)) {
        showMessage("Only @fedexfreight.com email addresses are allowed to use this page.");
        return;
      }

      try {
        await auth.sendPasswordResetEmail(email);
        showMessage("A password reset email has been sent successfully.", "success");
      } catch (error) {
        let friendlyMessage = error.message || "Unable to send the password reset email.";

        if (error.code === "auth/user-not-found") {
          friendlyMessage = "No account was found for that email address.";
        } else if (error.code === "auth/invalid-email") {
          friendlyMessage = "Please enter a valid email address.";
        }

        showMessage(friendlyMessage);
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await auth.signOut();
        hideOtpStep();
        showMessage("You have been signed out successfully.", "success");
      } catch (error) {
        showMessage(error.message || "Unable to sign out right now.");
      }
    });

    auth.onAuthStateChanged(async (user) => {
      logoutBtn.style.display = user ? "inline-flex" : "none";

      if (!user) {
        hideOtpStep();
        return;
      }

      if (!isAllowedFedExEmail(user.email)) {
        await auth.signOut();
        showMessage("Only @fedexfreight.com email addresses are allowed to use this page.");
        return;
      }

      if (!user.emailVerified) {
        return;
      }

      try {
        const approvalCheck = await checkApprovedUser(user.email);

        if (!approvalCheck.allowed) {
          await auth.signOut();
          showMessage(approvalCheck.reason || "You are not authorized to access this system.");
        }
      } catch (error) {
        console.error("Approval check failed:", error);
      }
    });
  </script>
</body>
</html>
