<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root{
      --fedex-purple:#4D148C;
      --fedex-orange:#FF6600;
      --text:#ffffff;
      --text-soft:rgba(255,255,255,.76);
      --text-muted:rgba(255,255,255,.58);
      --input-bg:rgba(255,255,255,.10);
      --input-border:rgba(255,255,255,.12);
      --success-bg:rgba(20,83,45,.42);
      --success-border:rgba(187,247,208,.28);
      --error-bg:rgba(127,29,29,.42);
      --error-border:rgba(254,202,202,.28);
      --shadow-xl:0 30px 80px rgba(2,6,23,.42);
      font-family:"Inter", sans-serif;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(130,77,255,.22), transparent 26%),
        radial-gradient(circle at bottom right, rgba(255,102,0,.10), transparent 18%),
        linear-gradient(180deg, #2b0d68 0%, #190d45 45%, #120b34 100%);
    }

    .shell{
      width:min(100%, 620px);
    }

    .card{
      border-radius:40px;
      padding:28px;
      background:
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.08), transparent 24%),
        radial-gradient(circle at 0% 100%, rgba(255,102,0,.08), transparent 24%),
        linear-gradient(180deg, rgba(52,22,115,.82), rgba(18,18,58,.76));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow-xl);
      backdrop-filter:blur(16px);
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(2rem, 5vw, 3rem);
      line-height:.95;
      letter-spacing:-.06em;
      font-weight:900;
    }

    p{
      margin:0 0 22px;
      color:var(--text-soft);
      font-size:15px;
      line-height:1.65;
    }

    .field{
      display:grid;
      gap:8px;
      margin-bottom:16px;
    }

    label{
      font-size:13px;
      font-weight:800;
      color:#fff;
    }

    .input-wrap{
      position:relative;
    }

    .left-icon{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      color:rgba(255,255,255,.88);
      font-size:16px;
      pointer-events:none;
    }

    input{
      width:100%;
      min-height:60px;
      border:none;
      outline:none;
      border-radius:20px;
      background:var(--input-bg);
      color:#fff;
      padding:0 58px 0 50px;
      font-size:15px;
      font-weight:700;
      box-shadow:inset 0 0 0 1px var(--input-border);
    }

    input::placeholder{
      color:rgba(255,255,255,.42);
      font-weight:600;
    }

    .toggle-password{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      width:36px;
      height:36px;
      border:none;
      border-radius:12px;
      background:transparent;
      color:rgba(255,255,255,.78);
      cursor:pointer;
      display:grid;
      place-items:center;
      font-size:15px;
    }

    .toggle-password:hover{
      background:rgba(255,255,255,.08);
      color:#fff;
    }

    .primary-btn{
      width:100%;
      min-height:60px;
      margin-top:4px;
      border:none;
      border-radius:20px;
      background:linear-gradient(135deg, var(--fedex-orange), #ff7a00);
      color:#fff;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 18px 34px rgba(255,102,0,.28);
    }

    .primary-btn:disabled{
      opacity:.75;
      cursor:not-allowed;
    }

    .message{
      margin-top:16px;
      padding:14px 16px;
      border-radius:16px;
      font-size:14px;
      line-height:1.65;
      display:none;
    }

    .message.error{
      display:block;
      background:var(--error-bg);
      color:#fff;
      border:1px solid var(--error-border);
    }

    .message.success{
      display:block;
      background:var(--success-bg);
      color:#fff;
      border:1px solid var(--success-border);
    }

    .rules{
      margin:18px 0 0;
      padding:16px;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      color:var(--text-soft);
      font-size:13px;
      line-height:1.7;
    }

    .rules strong{
      color:#fff;
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="card">
      <h1>Change password</h1>
      <p>For your security, please replace your temporary password before accessing the Decision Guide.</p>

      <div class="field">
        <label for="newPassword">New password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock left-icon"></i>
          <input id="newPassword" type="password" placeholder="Enter new password" autocomplete="new-password">
          <button class="toggle-password" type="button" data-target="newPassword">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-shield-halved left-icon"></i>
          <input id="confirmPassword" type="password" placeholder="Confirm new password" autocomplete="new-password">
          <button class="toggle-password" type="button" data-target="confirmPassword">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      <button class="primary-btn" id="updateBtn" type="button">Update Password</button>

      <div id="message" class="message"></div>

      <div class="rules">
        <strong>Password requirement:</strong><br>
        Use at least 8 characters with uppercase, lowercase, and a number.
      </div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDjaMdeh0Cgx00hzDyZOi54fDkR81wnxJU",
      authDomain: "bdgg-database.firebaseapp.com",
      projectId: "bdgg-database",
      storageBucket: "bdgg-database.appspot.com",
      messagingSenderId: "43574975434",
      appId: "1:43574975434:web:4c79e581267fdfcc6ccd33"
    };

    const APPROVED_USERS_COLLECTION = "approved_users";
    const REDIRECT_AFTER_CHANGE = "index-main.html";

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();

    const newPasswordEl = document.getElementById("newPassword");
    const confirmPasswordEl = document.getElementById("confirmPassword");
    const updateBtn = document.getElementById("updateBtn");
    const messageEl = document.getElementById("message");

    function showMessage(text, type = "error") {
      messageEl.className = "message " + type;
      messageEl.textContent = text;
    }

    function validatePassword(password) {
      return (
        password.length >= 8 &&
        /[A-Z]/.test(password) &&
        /[a-z]/.test(password) &&
        /[0-9]/.test(password)
      );
    }

    document.querySelectorAll(".toggle-password").forEach((btn) => {
      btn.addEventListener("click", () => {
        const targetId = btn.getAttribute("data-target");
        const input = document.getElementById(targetId);
        const icon = btn.querySelector("i");

        const hidden = input.type === "password";
        input.type = hidden ? "text" : "password";
        icon.className = hidden ? "fa-regular fa-eye-slash" : "fa-regular fa-eye";
      });
    });

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      if (!user.emailVerified) {
        await auth.signOut();
        window.location.href = "index.html";
        return;
      }

      const email = user.email.toLowerCase();
      const doc = await db.collection(APPROVED_USERS_COLLECTION).doc(email).get();

      if (!doc.exists || doc.data().active === false) {
        await auth.signOut();
        window.location.href = "index.html";
        return;
      }

      if (doc.data().forcePasswordChange !== true) {
        window.location.href = REDIRECT_AFTER_CHANGE;
      }
    });

    updateBtn.addEventListener("click", async () => {
      const user = auth.currentUser;
      const newPassword = newPasswordEl.value;
      const confirmPassword = confirmPasswordEl.value;

      if (!user) {
        showMessage("Your session expired. Please sign in again.");
        return;
      }

      if (!newPassword || !confirmPassword) {
        showMessage("Please enter and confirm your new password.");
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage("Passwords do not match.");
        return;
      }

      if (!validatePassword(newPassword)) {
        showMessage("Password must be at least 8 characters and include uppercase, lowercase, and a number.");
        return;
      }

      try {
        updateBtn.disabled = true;
        updateBtn.textContent = "Updating password...";

        await user.updatePassword(newPassword);

        await db.collection(APPROVED_USERS_COLLECTION)
          .doc(user.email.toLowerCase())
          .update({
            forcePasswordChange: false,
            passwordChangedAt: Date.now()
          });

        showMessage("Password updated successfully. Redirecting...", "success");

        setTimeout(() => {
          window.location.href = REDIRECT_AFTER_CHANGE;
        }, 1200);
      } catch (error) {
        let message = error.message || "Unable to update password.";

        if (error.code === "auth/requires-recent-login") {
          message = "For security, please sign in again before changing your password.";
          await auth.signOut();
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1200);
        }

        showMessage(message);
      } finally {
        updateBtn.disabled = false;
        updateBtn.textContent = "Update Password";
      }
    });
  </script>
</body>
</html>
